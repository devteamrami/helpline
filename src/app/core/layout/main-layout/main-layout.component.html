<!-- Navigation Drawer Overlay -->
<div 
  class="drawer-overlay" 
  [class.active]="isDrawerOpen"
  (click)="closeDrawer()"
></div>

<!-- Navigation Drawer -->
<nav class="navigation-drawer" [class.open]="isDrawerOpen">
  <!-- Drawer Header -->
  <div class="drawer-header">
    <div class="logo-section">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="12" fill="url(#gradient)"/>
          <path d="M24 12L34 18V30L24 36L14 30V18L24 12Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="gradient" x1="0" y1="0" x2="48" y2="48">
              <stop offset="0%" stop-color="#667eea"/>
              <stop offset="100%" stop-color="#764ba2"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="logo-text">
        <h1>Ramiscope</h1>
        <span>Project Management</span>
      </div>
    </div>
    <button class="close-button" (click)="closeDrawer()" *ngIf="isMobile">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <!-- User Profile Section -->
  <div class="user-profile" *ngIf="currentUser">
    <div class="user-avatar">{{ getUserInitials() }}</div>
    <div class="user-info">
      <div class="user-name">{{ getUserDisplayName() }}</div>
      <div class="user-role" [ngClass]="getRoleBadgeClass()">
        {{ currentUser.role || 'User' }}
      </div>
    </div>
  </div>

  <!-- Navigation Menu -->
  <div class="navigation-menu">
    <ng-container *ngFor="let item of menuItems">
      <div class="menu-item" *ngIf="canViewMenuItem(item)">
        <!-- Parent Menu Item -->
        <button 
          class="menu-button"
          [class.active]="isRouteActive(item.route)"
          [class.has-children]="item.children"
          [class.expanded]="item.expanded"
          (click)="toggleMenuItem(item)"
        >
          <span class="menu-icon" [attr.data-icon]="item.icon">
            <!-- Dashboard Icon -->
            <svg *ngIf="item.icon === 'dashboard'" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
            </svg>
            <!-- Projects Icon -->
            <svg *ngIf="item.icon === 'projects'" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
            </svg>
            <!-- Tasks Icon -->
            <svg *ngIf="item.icon === 'tasks'" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm-2 14l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
            </svg>
            <!-- Team Icon -->
            <svg *ngIf="item.icon === 'team'" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
            </svg>
            <!-- Reports Icon -->
            <svg *ngIf="item.icon === 'reports'" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
            </svg>
            <!-- Admin Icon -->
            <svg *ngIf="item.icon === 'admin'" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
            </svg>
            <!-- Tickets Icon -->
            <svg *ngIf="item.icon === 'tickets'" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
            </svg>
            <!-- FAQs Icon -->
            <svg *ngIf="item.icon === 'faqs'" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M11 18h2v-2h-2v2zm1-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z"/>
            </svg>
          </span>
          <span class="menu-label">{{ item.label }}</span>
          <!-- Chevron for expandable items (moved outside menu-icon) -->
          <svg *ngIf="item.children" class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>

        <!-- Child Menu Items -->
        <div class="submenu" *ngIf="item.children && item.expanded">
          <ng-container *ngFor="let child of item.children">
            <button 
              *ngIf="canViewMenuItem(child)"
              class="submenu-button"
              [class.active]="isRouteActive(child.route)"
              (click)="navigateTo(child.route!)"
            >
              <span class="submenu-dot"></span>
              <span class="submenu-label">{{ child.label }}</span>
            </button>
          </ng-container>
        </div>
      </div>
    </ng-container>
  </div>

  <!-- Drawer Footer -->
  <div class="drawer-footer">
    <button class="logout-button" (click)="logout()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span>Logout</span>
    </button>
  </div>
</nav>

<!-- Main Content Area -->
<div class="main-content" [class.drawer-open]="isDrawerOpen && !isMobile">
  <!-- Floating Hamburger Menu Button -->
  <button class="floating-menu-toggle" (click)="toggleDrawer()" [class.drawer-open]="isDrawerOpen">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>

  <!-- Page Content -->
  <main class="page-content">
    <router-outlet></router-outlet>
  </main>
</div>
